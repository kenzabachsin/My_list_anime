<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Anime List - Auto Update</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
    <div class="logo-container">
        <h1 class="glitch-text">MY ANIME WATCHLIST</h1>
        <div class="status-bar">
            <span class="dot"></span>
            <p>Data otomatis update dari MyAnimeList API</p>
        </div>
    </div>
</header>
<div class="floating-container">
    <button class="fab" id="fab-main"><span>🎬</span></button>
    
    <div class="fab-menu" id="fab-menu">
        <button class="menu-item trigger-jadwal" onclick="toggleSubMenu()">📅 JADWAL MUSIM</button>
        
        <div id="sub-menu-jadwal" class="sub-menu">
            <button class="menu-item sub" onclick="filterAnime('winter')">WINTER (Januari - Maret)</button>
            <button class="menu-item sub" onclick="filterAnime('spring')">SPRING (April - Juni)</button>
            <button class="menu-item sub" onclick="filterAnime('summer')">SUMMER (Juli - September)</button>
            <button class="menu-item sub" onclick="filterAnime('fall')">FALL (Oktober - Desember)</button>
        </div>

        <button class="menu-item" onclick="filterAnime('all')">👁️ LIHAT SEMUA</button>
    </div>
</div>
    <main id="anime-list" class="container"></main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="detail-konten"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
