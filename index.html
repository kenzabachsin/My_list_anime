<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Anime List - Auto Update</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
    <div class="logo-container">
        <h1 class="glitch-text">MY ANIME WATCHLIST</h1>
        <div class="status-bar">
            <span class="dot"></span>
            <p>Data otomatis update dari MyAnimeList API</p>
        </div>
    </div>
</header>
    <main id="anime-list" class="container"></main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="detail-konten"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
